services:

  feeder-server:
    image: ghcr.io/alexanderyakovlev-yassa/feeder-server-app:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: feeder
      DB_USERNAME: alex
      DB_PASSWORD: ${DB_PASSWORD}
      MQTT_BROKER: tcp://mqtt-service:1883
      MQTT_USERNAME: alex
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_SECRET: ${JWT_SECRET}
      # Camera — ffmpeg binary path inside the container.
      # Override CAM_FFMPEG_PATH if ffmpeg is not on PATH in your image.
      CAM_FFMPEG_PATH: ffmpeg
      CAM_RECONNECT_INTERVAL_MS: 30000
    volumes:
      # Persistent storage for MPEG-TS camera segments.
      # Camera storagePath values in the DB should start with /recordings/,
      # e.g. /recordings/CatCamMaster
      - /home/alex/feeder-infrastructure/volumes/camera-recordings:/recordings:rw
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/feeder-service/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - prod-net

networks:
  prod-net:
    external: true
    name: prod-net