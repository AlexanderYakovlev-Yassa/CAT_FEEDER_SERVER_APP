# Development Profile Configuration

# MQTT configuration
mqtt.enabled=true
mqtt.broker=tcp://localhost:1883
mqtt.clientId=feeder-server-dev
mqtt.username=alex
mqtt.password=123
mqtt.defaultTopic=feeder/updates

# PostgreSQL datasource (local dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/feeder
spring.datasource.username=alex
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.pl.torun.alex.feeder=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

