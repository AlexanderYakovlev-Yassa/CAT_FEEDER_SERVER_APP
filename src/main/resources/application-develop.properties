# Development Profile Configuration

# Server
server.port=${APP_PORT:8081}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# MQTT configuration
mqtt.enabled=true
mqtt.broker=tcp://localhost:${MQTT_PORT:1883}
mqtt.clientId=feeder-server-dev
mqtt.username=alex
mqtt.password=123
mqtt.defaultTopic=feeder/updates

# PostgreSQL datasource (local dev)
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5432}/feeder
spring.datasource.username=alex
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.contexts=dev

# JWT configuration
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# Actuator
management.endpoint.health.show-details=always

# Logging
logging.level.pl.torun.alex.feeder=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Camera recording
camera.reconnect-interval-ms=15000
camera.ffmpeg-stimeout-us=5000000
