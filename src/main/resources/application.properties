spring.application.name=feeder-server

# Default active profile
spring.profiles.active=develop

# Server configuration
server.servlet.context-path=/feeder-service/api


# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Git properties (generated by git-commit-id-maven-plugin, used by /build-info endpoint)
spring.config.import=optional:classpath:git.properties

# Actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Calibration
calibration.duration-ms=2000
calibration.total-attempts=5
calibration.session-expiry-minutes=30



