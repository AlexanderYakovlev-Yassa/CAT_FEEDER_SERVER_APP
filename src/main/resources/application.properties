spring.application.name=feeder-server

# Default active profile
spring.profiles.active=develop

# Server configuration
server.servlet.context-path=/feeder-service/api


# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Git properties (generated by git-commit-id-maven-plugin, used by /build-info endpoint)
spring.config.import=optional:classpath:git.properties

# Actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Calibration
calibration.duration-ms=2000
calibration.total-attempts=5
calibration.session-expiry-minutes=30

# Camera recording – common defaults (overridable per profile)
camera.ffmpeg-path=ffmpeg
camera.segment-duration-seconds=600
camera.max-storage-bytes=107374182400
camera.rollover-check-interval-ms=60000
# How often (ms) the service tries to reconnect a camera that stopped recording
camera.reconnect-interval-ms=30000
camera.ffmpeg-stimeout-us=10000000
# Number of completed segments in the live HLS sliding-window playlist (5 × 10 min = 50 min buffer)
camera.live-window-segments=5
# Transcode incoming RTSP stream to H.264+AAC for browser HLS compatibility (true = re-encode, false = copy-through)
camera.transcode-for-browser=true
# libx264 CRF quality (lower = higher quality; default 23)
camera.transcode-crf=23
