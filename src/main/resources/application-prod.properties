# Production Profile Configuration

# Server
server.port=8080

# MQTT configuration
mqtt.enabled=true
mqtt.broker=${MQTT_BROKER}
mqtt.clientId=feeder-server-prod
mqtt.username=${MQTT_USERNAME}
mqtt.password=${MQTT_PASSWORD}
mqtt.defaultTopic=feeder/updates

# PostgreSQL datasource (production)
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:feeder}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.contexts=prod

# JWT configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.pl.torun.alex.feeder=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Camera recording
camera.ffmpeg-path=${CAM_FFMPEG_PATH:ffmpeg}
camera.reconnect-interval-ms=${CAM_RECONNECT_INTERVAL_MS:30000}
camera.ffmpeg-stimeout-us=${CAM_FFMPEG_STIMEOUT_US:10000000}

# Security
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
