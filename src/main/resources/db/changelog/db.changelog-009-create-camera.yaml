databaseChangeLog:
  - changeSet:
      id: 009-create-camera
      author: auto
      changes:
        - createTable:
            tableName: camera
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: rtsp_url
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
              - column:
                  name: storage_path
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
              - column:
                  name: auto_start
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

