databaseChangeLog:
  - changeSet:
      id: 002-create-device
      author: auto
      changes:
        - createTable:
            tableName: device
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: device
            baseColumnNames: user_id
            constraintName: fk_device_user
            referencedTableName: app_user
            referencedColumnNames: id
            onDelete: CASCADE
