databaseChangeLog:
  - changeSet:
      id: 010-create-user-to-camera
      author: auto
      changes:
        - createTable:
            tableName: user_to_camera
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: camera_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            columnNames: "user_id, camera_id"
            tableName: user_to_camera
            constraintName: pk_user_to_camera
        - addForeignKeyConstraint:
            baseTableName: user_to_camera
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_user_to_camera_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_to_camera
            baseColumnNames: camera_id
            referencedTableName: camera
            referencedColumnNames: id
            constraintName: fk_user_to_camera_camera
            onDelete: CASCADE

