name: Build on GitHub and Deploy Locally

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      GH_USER: alexanderyakovlev-yassa
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.GH_USER }}/feeder-server-app:staging
            ghcr.io/${{ env.GH_USER }}/feeder-server-app:${{ github.sha }}

      - name: Deploy to Dokploy
        run: |
          curl -X POST ${{ secrets.DOKPLOY_STAGING_WEBHOOK_URL }}
